<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="250" viewBox="0 0 1180 250">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#51606d"/>
    </marker>
  </defs>
  <style>
    .box { stroke-width: 2.5; rx: 18; ry: 18; }
    .label { font: 700 20px sans-serif; fill: #1f2933; text-anchor: middle; dominant-baseline: middle; }
    .small { font: 600 15px sans-serif; fill: #52606d; text-anchor: middle; }
    .arrow { stroke: #51606d; stroke-width: 3; marker-end: url(#arrow); }
  </style>
  <rect x="30" y="78" width="120" height="96" fill="#eef2f7" stroke="#52606d" class="box"/>
  <text x="90" y="126" class="label">Outside</text>

  <rect x="200" y="66" width="210" height="120" fill="#dfeeff" stroke="#2f6db2" class="box"/>
  <text x="305" y="106" class="label">Provider / External</text>
  <text x="305" y="138" class="small">public entry point</text>

  <rect x="460" y="66" width="250" height="120" fill="#fff1d6" stroke="#d48806" class="box"/>
  <text x="585" y="98" class="label">Virtual Router</text>
  <text x="585" y="128" class="small">DNAT / Floating IP</text>
  <text x="585" y="154" class="small">public -&gt; private</text>

  <rect x="760" y="66" width="210" height="120" fill="#e4f7ea" stroke="#2f855a" class="box"/>
  <text x="865" y="106" class="label">Tenant Network</text>
  <text x="865" y="138" class="small">isolated internal network</text>

  <rect x="1020" y="78" width="130" height="96" fill="#f0eaff" stroke="#6b46c1" class="box"/>
  <text x="1085" y="106" class="label">VM</text>
  <text x="1085" y="136" class="small">private IP</text>

  <line x1="150" y1="126" x2="200" y2="126" class="arrow"/>
  <line x1="410" y1="126" x2="460" y2="126" class="arrow"/>
  <line x1="710" y1="126" x2="760" y2="126" class="arrow"/>
  <line x1="970" y1="126" x2="1020" y2="126" class="arrow"/>
</svg>
