<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="260" viewBox="0 0 1080 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#51606d"/>
    </marker>
  </defs>
  <style>
    .box { stroke-width: 2.5; rx: 18; ry: 18; }
    .label { font: 700 21px sans-serif; fill: #1f2933; text-anchor: middle; dominant-baseline: middle; }
    .small { font: 600 16px sans-serif; fill: #52606d; text-anchor: middle; }
    .arrow { stroke: #51606d; stroke-width: 3; marker-end: url(#arrow); }
  </style>
  <rect x="40" y="84" width="130" height="92" fill="#f0eaff" stroke="#6b46c1" class="box"/>
  <text x="105" y="112" class="label">VM1</text>
  <text x="105" y="142" class="small">10.0.1.5</text>

  <rect x="220" y="70" width="190" height="120" fill="#e4f7ea" stroke="#2f855a" class="box"/>
  <text x="315" y="110" class="label">TenantNet A</text>
  <text x="315" y="142" class="small">subnet A</text>

  <rect x="460" y="70" width="170" height="120" fill="#fff1d6" stroke="#d48806" class="box"/>
  <text x="545" y="110" class="label">Virtual Router</text>
  <text x="545" y="142" class="small">routes between subnets</text>

  <rect x="680" y="70" width="190" height="120" fill="#e4f7ea" stroke="#2f855a" class="box"/>
  <text x="775" y="110" class="label">TenantNet B</text>
  <text x="775" y="142" class="small">subnet B</text>

  <rect x="910" y="84" width="130" height="92" fill="#f0eaff" stroke="#6b46c1" class="box"/>
  <text x="975" y="112" class="label">VM2</text>
  <text x="975" y="142" class="small">10.0.2.6</text>

  <line x1="170" y1="130" x2="220" y2="130" class="arrow"/>
  <line x1="410" y1="130" x2="460" y2="130" class="arrow"/>
  <line x1="630" y1="130" x2="680" y2="130" class="arrow"/>
  <line x1="870" y1="130" x2="910" y2="130" class="arrow"/>
</svg>
